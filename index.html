                                </div>
                            </div>

                            {/* Janela de Chat */}
                            <div className="md:col-span-2 glass-panel rounded-2xl border border-white/5 flex flex-col justify-between overflow-hidden">
                                {selectedMessage ? (
                                    <>
                                        <div className="p-4 border-b border-brand-borderBg bg-white/2 flex justify-between items-center">
                                            <div>
                                                <h4 className="font-extrabold text-white text-sm">{selectedMessage.buyerName}</h4>
                                                <span className="text-[10px] text-gray-500">Perguntou sobre: <strong className="text-white">{selectedMessage.productTitle}</strong></span>
                                            </div>
                                            <a 
                                                href={selectedMessage.productUrl} 
                                                target="_blank" 
                                                rel="noopener noreferrer"
                                                className="text-brand-orange hover:text-white flex items-center gap-1 text-[10px] font-bold uppercase"
                                            >
                                                Ver no Site
                                                <span className="text-xs">🔗</span>
                                            </a>
                                        </div>

                                        <div className="flex-1 p-6 overflow-y-auto space-y-4">
                                            {/* Mensagem do Comprador */}
                                            <div className="flex items-start gap-3 max-w-[80%]">
                                                <div className="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center font-bold text-xs text-white">
                                                    {selectedMessage.buyerName.substring(0, 1)}
                                                </div>
                                                <div className="bg-[#1C1C22] border border-white/5 rounded-2xl p-4 text-xs text-gray-300">
                                                    {selectedMessage.messageText}
                                                </div>
                                            </div>

                                            {/* Resposta do Agente */}
                                            {selectedMessage.replied && (
                                                <div className="flex items-start gap-3 max-w-[80%] ml-auto flex-row-reverse">
                                                    <div className="w-8 h-8 rounded-full bg-[#7C3AED] flex items-center justify-center font-bold text-xs text-black">
                                                        IA
                                                    </div>
                                                    <div className="bg-[#7C3AED]/10 border border-[#7C3AED]/20 rounded-2xl p-4 text-xs text-white">
                                                        {selectedMessage.replyText}
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="p-4 border-t border-brand-borderBg bg-white/2 space-y-3">
                                            <div className="flex justify-between items-center">
                                                <span className="text-[9px] text-gray-500 font-extrabold uppercase">Escrever resposta</span>
                                                <button 
                                                    onClick={generateAIReply}
                                                    className="bg-[#7C3AED]/10 hover:bg-[#7C3AED]/20 text-[#7C3AED] border border-[#7C3AED]/30 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase flex items-center gap-1.5 transition-all"
                                                >
                                                    <span className="text-xs">✨</span>
                                                    Gerar com IA Kika
                                                </button>
                                            </div>
                                            <form onSubmit={handleSendReply} className="flex gap-2">
                                                <input
                                                    type="text"
                                                    placeholder="Digite a resposta ou use o botão 'Gerar com IA Kika'..."
                                                    value={replyText}
                                                    onChange={e => setReplyText(e.target.value)}
                                                    className="flex-1 bg-[#16161A] border border-brand-borderBg text-white rounded-xl px-4 py-3 text-xs focus:outline-none focus:border-brand-orange"
                                                />
                                                <button 
                                                    type="submit"
                                                    disabled={!replyText.trim()}
                                                    className="bg-[#7C3AED] text-black font-bold px-5 rounded-xl hover:bg-[#7C3AED]/90 transition-all disabled:opacity-50 flex items-center justify-center"
                                                >
                                                    <span className="text-sm">📤</span>
                                                </button>
                                            </form>
                                        </div>
                                    </>
                                ) : (
                                    <div className="flex-1 flex flex-col items-center justify-center text-gray-500 text-xs">
                                        Selecione uma conversa na barra lateral.
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ABA: CONFIGURAÇÕES */}
                    {activeTab === 'config' && (
                        <div className="max-w-2xl glass-panel p-8 rounded-2xl border border-white/5 animate-fade-in">
                            <div className="mb-6">
                                <h4 className="font-extrabold text-white text-base">Credenciais da API do Facebook (Meta)</h4>
                                <p className="text-xs text-gray-500 mt-1">Insira as credenciais do seu aplicativo Meta Business para liberar publicações de catálogo automáticas.</p>
                            </div>

                            <form onSubmit={handleSaveConfig} className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mb-2">ID do Business Account</label>
                                        <input 
                                            type="text"
                                            value={config.businessId}
                                            onChange={e => setConfig({ ...config, businessId: e.target.value })}
                                            className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange text-xs font-bold"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mb-2">ID da Página do Facebook</label>
                                        <input 
                                            type="text"
                                            value={config.pageId}
                                            onChange={e => setConfig({ ...config, pageId: e.target.value })}
                                            className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange text-xs font-bold"
                                        />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mb-2">ID do Catálogo de Comércio Meta</label>
                                    <input 
                                        type="text"
                                        placeholder="Insira o ID do catálogo comercial do Facebook..."
                                        value={config.catalogId}
                                        onChange={e => setConfig({ ...config, catalogId: e.target.value })}
                                        className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange text-xs font-bold"
                                    />
                                </div>

                                <div>
                                    <label className="block text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mb-2">Facebook Access Token (System User)</label>
                                    <textarea 
                                        placeholder="Cole seu System User Access Token do Facebook Business Suite..."
                                        value={config.accessToken}
                                        onChange={e => setConfig({ ...config, accessToken: e.target.value })}
                                        rows={4}
                                        className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange text-xs font-mono"
                                    />
                                </div>

                                <button 
                                    type="submit"
                                    disabled={isSavingConfig}
                                    className="btn-gradient w-full py-3 rounded-xl text-black font-bold uppercase tracking-wider text-xs"
                                >
                                    {isSavingConfig ? 'Gravando dados...' : 'Salvar Configurações Meta'}
                                </button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        // --- ABA 9: ESTOQUE DE FILAMENTOS (INSUMOS) ---
        function EstoqueView({ filaments, setFilaments, suppliers }) {
            const [isAdding, setIsAdding] = useState(false);
            const [newFilament, setNewFilament] = useState({
                name: '',
                supplierId: suppliers[0]?.id || '',
                initialWeight: '1000',
                currentWeight: '1000',
                alertThreshold: '200',
                colorHex: '#30D158',
                material: 'PLA',
                type: 'filament'
            });

            const getUnit = (type) => {
                if (type === 'resin') return 'ml';
                if (type === 'unit' || type === 'other' || type === 'product') return 'un';
                return 'g';
            };

            const getTypeLabel = (type) => {
                if (type === 'resin') return 'Resina';
                if (type === 'unit') return 'Componente';
                if (type === 'product') return 'Produto Acabado';
                if (type === 'other') return 'Outro Insumo';
                return 'Filamento';
            };

            const handleSave = (e) => {
                e.preventDefault();
                const fil = {
                    id: 'fil' + (filaments.length + 1) + Date.now().toString().slice(-2),
                    name: newFilament.name,
                    supplierId: newFilament.supplierId,
                    initialWeight: parseFloat(newFilament.initialWeight) || 1000,
                    currentWeight: parseFloat(newFilament.currentWeight) || 1000,
                    alertThreshold: parseFloat(newFilament.alertThreshold) || 200,
                    colorHex: newFilament.colorHex,
                    material: newFilament.material,
                    type: newFilament.type || 'filament'
                };
                setFilaments([...filaments, fil]);
                setIsAdding(false);
                setNewFilament({
                    name: '',
                    supplierId: suppliers[0]?.id || '',
                    initialWeight: '1000',
                    currentWeight: '1000',
                    alertThreshold: '200',
                    colorHex: '#30D158',
                    material: 'PLA',
                    type: 'filament'
                });
            };

            const handleDelete = (id) => {
                if (confirm("Deseja realmente remover este item do estoque?")) {
                    setFilaments(filaments.filter(f => f.id !== id));
                }
            };

            const handleAdjustWeight = (id, newWeight) => {
                const val = parseFloat(newWeight);
                if (!isNaN(val) && val >= 0) {
                    setFilaments(filaments.map(f => f.id === id ? { ...f, currentWeight: val } : f));
                }
            };

            const unit = getUnit(newFilament.type);

            return (
                <div className="space-y-8 animate-fade-in">
                    <div className="flex justify-between items-center border-b border-brand-borderBg pb-4">
                        <div>
                            <span className="text-xs font-bold tracking-widest text-brand-orange uppercase">Logística & Materiais</span>
                            <h3 className="font-black text-2xl text-gradient">Estoque & Insumos Gerais</h3>
                        </div>
                        <button 
                            onClick={() => setIsAdding(!isAdding)}
                            className="bg-brand-orange/10 border border-brand-orange/40 hover:bg-brand-orange/20 text-brand-orange px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition-all"
                        >
                            <i data-lucide={isAdding ? "minus" : "plus"} className="w-4 h-4"></i>
                            {isAdding ? "Fechar Painel" : "Cadastrar Insumo"}
                        </button>
                    </div>

                    {isAdding && (
                        <form onSubmit={handleSave} className="glass-panel border border-white/15 rounded-2xl p-6 grid grid-cols-1 md:grid-cols-4 gap-4 animate-fade-in shadow-2xl">
                            <div className="md:col-span-2">
                                <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Nome do Insumo / Material</label>
                                <input 
                                    type="text" required placeholder="Ex: Filamento PLA Azul, Resina Lavável 1L, Caixa Sedex 2, Action Figure Groot"
                                    value={newFilament.name} onChange={e => setNewFilament({...newFilament, name: e.target.value})}
                                    className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange"
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Tipo de Insumo</label>
                                <select 
                                    value={newFilament.type} onChange={e => {
                                        const t = e.target.value;
                                        let defaultVal = '1000';
                                        let defaultAlert = '200';
                                        if (t === 'unit' || t === 'product') {
                                            defaultVal = '50';
                                            defaultAlert = '5';
                                        }
                                        setNewFilament({
                                            ...newFilament, 
                                            type: t, 
                                            initialWeight: defaultVal, 
                                            currentWeight: defaultVal, 
                                            alertThreshold: defaultAlert
                                        });
                                    }}
                                    className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange"
                                >
                                    <option value="filament">Filamento (g)</option>
                                    <option value="resin">Resina (ml)</option>
                                    <option value="unit">Componente / Unidade (un)</option>
                                    <option value="product">Produto Acabado (un)</option>
                                    <option value="other">Outros Insumos</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Especificação / Material</label>
                                <input 
                                    type="text" placeholder="Ex: PLA, TPU, Plástico, Papelão"
                                    value={newFilament.material} onChange={e => setNewFilament({...newFilament, material: e.target.value})}
                                    className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange"
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Fornecedor</label>
                                <select 
                                    value={newFilament.supplierId} onChange={e => setNewFilament({...newFilament, supplierId: e.target.value})}
                                    className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange"
                                >
                                    <option value="">Selecione...</option>
                                    {suppliers.map(sup => (
                                        <option key={sup.id} value={sup.id}>{sup.name}</option>
                                    ))}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Quantidade Inicial ({unit})</label>
                                <input 
                                    type="number" required
                                    value={newFilament.initialWeight} onChange={e => setNewFilament({...newFilament, initialWeight: e.target.value})}
                                    className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange"
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Quantidade Atual ({unit})</label>
                                <input 
                                    type="number" required
                                    value={newFilament.currentWeight} onChange={e => setNewFilament({...newFilament, currentWeight: e.target.value})}
                                    className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange"
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Limite Crítico ({unit})</label>
                                <input 
                                    type="number" required
                                    value={newFilament.alertThreshold} onChange={e => setNewFilament({...newFilament, alertThreshold: e.target.value})}
                                    className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange"
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Visualização da Cor (Hex)</label>
                                <div className="flex gap-2">
                                    <input 
                                        type="color" 
                                        value={newFilament.colorHex} onChange={e => setNewFilament({...newFilament, colorHex: e.target.value})}
                                        className="w-12 h-12 bg-transparent border-0 rounded cursor-pointer"
                                    />
                                    <input 
                                        type="text" 
                                        value={newFilament.colorHex} onChange={e => setNewFilament({...newFilament, colorHex: e.target.value})}
                                        className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange text-xs font-mono"
                                    />
                                </div>
                            </div>

                            <button type="submit" className="md:col-span-4 btn-gradient py-3.5 rounded-xl text-black font-bold uppercase tracking-wider text-xs md:text-sm">
                                Confirmar Cadastro
                            </button>
                        </form>
                    )}

                    {/* Listagem das Bobinas / Insumos */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filaments.length === 0 ? (
                            <div className="col-span-full text-center py-12 glass-panel">
                                <i data-lucide="package" className="w-12 h-12 text-gray-500 mx-auto mb-4"></i>
                                <p className="text-gray-400 text-sm font-semibold">Nenhum insumo ou material no estoque.</p>
                            </div>
                        ) : filaments.map(fil => {
                            const isLow = fil.currentWeight <= fil.alertThreshold;
                            const pct = Math.min((fil.currentWeight / fil.initialWeight) * 100, 100);
                            const supName = suppliers.find(s => s.id === fil.supplierId)?.name || 'Fornecedor Desconhecido';
                            const itemUnit = getUnit(fil.type);
                            const itemLabel = getTypeLabel(fil.type);

                            return (
                                <div key={fil.id} className="glass-panel p-6 rounded-2xl flex flex-col justify-between border border-white/5 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-24 h-24 rounded-full blur-3xl opacity-10" style={{ backgroundColor: fil.colorHex }}></div>
                                    
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-start">
                                            <div className="flex items-center gap-3">
                                                <span className="w-4 h-4 rounded-full border border-white/10" style={{ backgroundColor: fil.colorHex }} title={fil.colorHex}></span>
                                                <div>
                                                    <h4 className="font-extrabold text-white text-base leading-tight">{fil.name}</h4>
                                                    <span className="text-[9px] text-gray-500 font-extrabold uppercase tracking-widest">{itemLabel} • {fil.material} • {supName}</span>
                                                </div>
                                            </div>
                                            <button 
                                                onClick={() => handleDelete(fil.id)}
                                                className="text-gray-500 hover:text-rose-400 p-1.5 hover:bg-rose-500/10 rounded-lg transition-all"
                                            >
                                                <i data-lucide="trash-2" className="w-4 h-4"></i>
                                            </button>
                                        </div>

                                        <div className="space-y-2">
                                            <div className="flex justify-between text-xs font-bold text-gray-300">
                                                <span>Estoque Disponível:</span>
                                                <span className={isLow ? "text-rose-400 font-black animate-pulse" : "text-emerald-400"}>
                                                    {fil.currentWeight}{itemUnit} / {fil.initialWeight}{itemUnit}
                                                </span>
                                            </div>

                                            {/* Barra de Progresso */}
                                            <div className="h-2.5 w-full bg-white/5 rounded-full overflow-hidden">
                                                <div 
                                                    className={`h-full rounded-full transition-all duration-300 ${isLow ? 'bg-rose-500' : 'bg-emerald-500'}`}
                                                    style={{ width: `${pct}%`, backgroundColor: isLow ? undefined : fil.colorHex }}
                                                ></div>
                                            </div>

                                            {isLow && (
                                                <div className="bg-rose-500/10 border border-rose-500/20 text-rose-400 rounded-lg p-2 text-[10px] font-black uppercase text-center tracking-widest mt-1">
                                                    ⚠️ ESTOQUE CRÍTICO
                                                </div>
                                            )}
                                        </div>

                                        {/* Ajuste Manual Rápido */}
                                        <div className="bg-[#121215] border border-white/5 p-3 rounded-xl flex items-center justify-between gap-3">
                                            <span className="text-[10px] text-gray-500 font-bold uppercase">Ajustar Quantidade ({itemUnit}):</span>
                                            <input 
                                                type="number" 
                                                defaultValue={fil.currentWeight}
                                                onBlur={(e) => handleAdjustWeight(fil.id, e.target.value)}
                                                onKeyDown={(e) => e.key === 'Enter' && handleAdjustWeight(fil.id, e.target.value)}
                                                className="w-20 bg-[#16161A] border border-white/5 text-white rounded-lg p-1.5 text-center text-xs font-extrabold focus:outline-none focus:border-brand-orange"
                                            />
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

            // --- VIEW DE FORNECEDORES ---
            function SuppliersView({ suppliers, setSuppliers }) {
                const [isAdding, setIsAdding] = useState(false);
                const [newSupplier, setNewSupplier] = useState({
                    name: '',
                    material: '',
                    leadTime: '',
                    rating: '5.0'
                });

                const handleSaveSupplier = (e) => {
                    e.preventDefault();
                    const sup = {
                        id: 'sup' + (suppliers.length + 1) + Date.now().toString().slice(-2),
                        name: newSupplier.name,
                        material: newSupplier.material,
                        pricePerKg: 0,
                        leadTime: newSupplier.leadTime,
                        rating: newSupplier.rating
                    };
                    setSuppliers([...suppliers, sup]);
                    setIsAdding(false);
                    setNewSupplier({ name: '', material: '', leadTime: '', rating: '5.0' });
                };

                const handleDelete = (id) => {
                    if (confirm("Deseja realmente remover este fornecedor?")) {
                        setSuppliers(suppliers.filter(s => s.id !== id));
                    }
                };

                return (
                    <div className="space-y-8">
                        <div className="flex justify-between items-center">
                            <div>
                                <span className="text-xs font-bold tracking-widest text-brand-orange uppercase">Suprimentos</span>
                                <h3 className="font-black text-2xl text-gradient">Parceiros & Fornecedores de Insumos</h3>
                            </div>
                            <button 
                                onClick={() => setIsAdding(!isAdding)}
                                className="bg-white/5 border border-brand-orange/30 text-white px-5 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-brand-orange/10 transition-all"
                            >
                                {isAdding ? "Cancelar" : "Novo Fornecedor"}
                            </button>
                        </div>

                        {isAdding && (
                            <form onSubmit={handleSaveSupplier} className="glass-panel border border-brand-orange/20 rounded-2xl p-6 grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Nome da Empresa</label>
                                    <input 
                                        type="text" required placeholder="Ex: 3D Fila"
                                        value={newSupplier.name} onChange={e => setNewSupplier({...newSupplier, name: e.target.value})}
                                        className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Material / Produto</label>
                                    <input 
                                        type="text" required placeholder="Ex: Filamento PLA/ABS"
                                        value={newSupplier.material} onChange={e => setNewSupplier({...newSupplier, material: e.target.value})}
                                        className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Prazo de Entrega</label>
                                    <input 
                                        type="text" required placeholder="Ex: 3 a 5 dias"
                                        value={newSupplier.leadTime} onChange={e => setNewSupplier({...newSupplier, leadTime: e.target.value})}
                                        className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange"
                                    />
                                </div>
                                <button type="submit" className="md:col-span-3 btn-gradient py-3 rounded-xl text-black font-bold uppercase tracking-wider">
                                    Cadastrar Fornecedor
                                </button>
                            </form>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {suppliers.map(sup => (
                                <div key={sup.id} className="glass-panel p-6 rounded-2xl flex flex-col justify-between border border-white/5">
                                    <div className="flex justify-between items-start mb-4">
                                        <div>
                                            <h4 className="font-extrabold text-white text-lg">{sup.name}</h4>
                                            <span className="text-[10px] text-brand-orange font-bold uppercase tracking-wider">{sup.material}</span>
                                        </div>
                                        <button 
                                            onClick={() => handleDelete(sup.id)}
                                            className="text-gray-500 hover:text-rose-400 p-1 rounded-lg"
                                        >
                                            <i data-lucide="trash-2" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                    <div className="bg-[#121215] p-3 rounded-xl border border-white/5 flex justify-between items-center text-xs mb-4">
                                        <span className="text-[10px] text-gray-500 font-bold uppercase">Prazo Médio</span>
                                        <span className="font-semibold text-white">{sup.leadTime}</span>
                                    </div>
                                    <div className="flex justify-between text-xs text-gray-400">
                                        <span>Avaliação do Suporte:</span>
                                        <span className="text-brand-yellow font-bold">★ {sup.rating}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            // --- ABA 8: DESPESAS ADMINISTRATIVAS ---
            function ExpensesView({ expenses, setExpenses, selectedMonth }) {
                const [isAdding, setIsAdding] = useState(false);
                const [newExpense, setNewExpense] = useState({
                    name: '',
                    category: 'Agua', // Agua, Luz, Telefone, Contador, Outros
                    value: '',
                    dueDate: '',
                    status: 'Pendente',
                    competency: selectedMonth // Prefills with active dashboard filter month
                });

                // Whenever selectedMonth changes, update the form's default competency
                useEffect(() => {
                    setNewExpense(prev => ({ ...prev, competency: selectedMonth }));
                }, [selectedMonth]);

                const handleSaveExpense = (e) => {
                    e.preventDefault();
                    const exp = {
                        id: 'exp' + (expenses.length + 1) + Date.now().toString().slice(-2),
                        name: newExpense.name,
                        category: newExpense.category,
                        value: parseFloat(newExpense.value),
                        dueDate: newExpense.dueDate,
                        status: newExpense.status,
                        competency: newExpense.competency
                    };
                    setExpenses([...expenses, exp]);
                    setIsAdding(false);
                    setNewExpense({ name: '', category: 'Agua', value: '', dueDate: '', status: 'Pendente', competency: selectedMonth });
                };

                const handleDelete = (id) => {
                    if (confirm("Deseja realmente remover esta despesa?")) {
                        setExpenses(expenses.filter(e => e.id !== id));
                    }
                };

                const toggleStatus = (id) => {
                    setExpenses(expenses.map(e => e.id === id ? { ...e, status: e.status === 'Pago' ? 'Pendente' : 'Pago' } : e));
                };

                // Filtro por Competência
                const filteredExpenses = expenses.filter(e => e.competency === selectedMonth);

                // Cálculos das Despesas do Mês Filtrado
                const totalExpensesValue = filteredExpenses.reduce((acc, curr) => acc + curr.value, 0);
                const paidExpensesValue = filteredExpenses.filter(e => e.status === 'Pago').reduce((acc, curr) => acc + curr.value, 0);
                const pendingExpensesValue = filteredExpenses.filter(e => e.status === 'Pendente').reduce((acc, curr) => acc + curr.value, 0);

                const getCategoryEmoji = (category) => {
                    switch(category) {
                        case 'Agua': return '💧';
                        case 'Luz': return '⚡';
                        case 'Telefone': return '🌐';
                        case 'Contador': return '💼';
                        default: return '💸';
                    }
                };

                return (
                    <div className="space-y-8 animate-fade-in">
                        <div className="flex justify-between items-center border-b border-brand-borderBg pb-4">
                            <div>
                                <span className="text-xs font-bold tracking-widest text-brand-orange uppercase">Gestão Financeira</span>
                                <h3 className="font-black text-2xl text-gradient">Despesas Administrativas</h3>
                            </div>
                            <button 
                                onClick={() => setIsAdding(!isAdding)}
                                className="bg-brand-orange/10 border border-brand-orange/40 hover:bg-brand-orange/20 text-brand-orange px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition-all"
                            >
                                <i data-lucide={isAdding ? "minus" : "plus"} className="w-4 h-4"></i>
                                {isAdding ? "Fechar Painel" : "Lançar Nova Despesa"}
                            </button>
                        </div>

                        {/* Indicadores de Despesas */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="glass-panel p-6 rounded-2xl border border-white/5 flex flex-col justify-between">
                                <span className="text-[10px] text-gray-500 font-extrabold uppercase tracking-widest">Total no Mês</span>
                                <span className="text-2xl font-black text-white mt-2">R$ {totalExpensesValue.toFixed(2)}</span>
                            </div>
                            <div className="glass-panel p-6 rounded-2xl border border-white/5 flex flex-col justify-between">
                                <span className="text-[10px] text-emerald-500 font-extrabold uppercase tracking-widest">Pago</span>
                                <span className="text-2xl font-black text-emerald-400 mt-2">R$ {paidExpensesValue.toFixed(2)}</span>
                            </div>
                            <div className="glass-panel p-6 rounded-2xl border border-white/5 flex flex-col justify-between">
                                <span className="text-[10px] text-rose-500 font-extrabold uppercase tracking-widest">Pendente</span>
                                <span className="text-2xl font-black text-rose-400 mt-2">R$ {pendingExpensesValue.toFixed(2)}</span>
                            </div>
                        </div>

                        {isAdding && (
                            <form onSubmit={handleSaveExpense} className="glass-panel border border-white/15 rounded-2xl p-6 grid grid-cols-1 md:grid-cols-4 gap-4 animate-fade-in shadow-2xl">
                                <div className="md:col-span-2">
                                    <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Descrição da Despesa</label>
                                    <input 
                                        type="text" required placeholder="Ex: Conta de Luz Oficina"
                                        value={newExpense.name} onChange={e => setNewExpense({...newExpense, name: e.target.value})}
                                        className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Categoria</label>
                                    <select 
                                        value={newExpense.category} onChange={e => setNewExpense({...newExpense, category: e.target.value})}
                                        className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange"
                                    >
                                        <option value="Agua">💧 Água</option>
                                        <option value="Luz">⚡ Luz</option>
                                        <option value="Telefone">🌐 Telefone & Internet</option>
                                        <option value="Contador">💼 Contador</option>
                                        <option value="Outros">💸 Outros</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Valor da Despesa (R$)</label>
                                    <input 
                                        type="number" step="0.01" required placeholder="0.00"
                                        value={newExpense.value} onChange={e => setNewExpense({...newExpense, value: e.target.value})}
                                        className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Data de Vencimento</label>
                                    <input 
                                        type="date" required
                                        value={newExpense.dueDate} onChange={e => setNewExpense({...newExpense, dueDate: e.target.value})}
                                        className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange text-gray-400"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Mês de Competência</label>
                                    <input 
                                        type="month" required
                                        value={newExpense.competency} onChange={e => setNewExpense({...newExpense, competency: e.target.value})}
                                        className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange text-gray-400"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Status Inicial</label>
                                    <select 
                                        value={newExpense.status} onChange={e => setNewExpense({...newExpense, status: e.target.value})}
                                        className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange"
                                    >
                                        <option value="Pendente">Pendente</option>
                                        <option value="Pago">Pago</option>
                                    </select>
                                </div>
                                <button type="submit" className="md:col-span-4 btn-gradient py-3.5 rounded-xl text-black font-bold uppercase tracking-wider text-xs md:text-sm">
                                    Cadastrar Despesa
                                </button>
                            </form>
                        )}

                        {/* Listagem de Despesas */}
                        <div className="glass-panel border border-white/5 rounded-2xl overflow-hidden shadow-lg">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm text-gray-300">
                                    <thead className="bg-white/5 border-b border-brand-borderBg text-[10px] font-extrabold uppercase tracking-widest text-gray-400">
                                        <tr>
                                            <th className="py-4 px-6">Categoria</th>
                                            <th className="py-4 px-6">Despesa</th>
                                            <th className="py-4 px-6">Vencimento</th>
                                            <th className="py-4 px-6 text-right">Valor</th>
                                            <th className="py-4 px-6 text-center">Status</th>
                                            <th className="py-4 px-6 text-right">Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-white/5">
                                        {filteredExpenses.length === 0 ? (
                                            <tr>
                                                <td colSpan="6" className="py-8 text-center text-gray-500 font-medium">Nenhuma despesa para o mês selecionado.</td>
                                            </tr>
                                        ) : (
                                            filteredExpenses.map(exp => (
                                                <tr key={exp.id} className="hover:bg-white/5 transition-all">
                                                    <td className="py-4 px-6 font-bold text-white text-base">
                                                        {getCategoryEmoji(exp.category)} {exp.category}
                                                    </td>
                                                    <td className="py-4 px-6 font-semibold text-white">{exp.name}</td>
                                                    <td className="py-4 px-6 font-medium text-gray-400">{exp.dueDate}</td>
                                                    <td className="py-4 px-6 text-right font-bold text-white">R$ {exp.value.toFixed(2)}</td>
                                                    <td className="py-4 px-6 text-center">
                                                        <button 
                                                            onClick={() => toggleStatus(exp.id)}
                                                            className={`text-[9px] px-3 py-1.5 rounded-full font-black uppercase tracking-wider transition-all border ${
                                                                exp.status === 'Pago' 
                                                                    ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' 
                                                                    : 'bg-rose-500/10 text-rose-400 border-rose-500/20 hover:bg-rose-500/20'
                                                            }`}
                                                        >
                                                            {exp.status}
                                                        </button>
                                                    </td>
                                                    <td className="py-4 px-6 text-right space-x-2">
                                                        <button 
                                                            onClick={() => handleDelete(exp.id)}
                                                            className="p-1.5 hover:bg-rose-500/20 text-gray-500 hover:text-rose-400 rounded-lg transition-all"
                                                        >
                                                            <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            }
        
        
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
