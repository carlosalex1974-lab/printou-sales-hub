<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printou Sales Hub - Controle de Vendas</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#7C3AED',
                            yellow: '#14B8A6',
                            darkBg: '#14141b',
                            cardBg: 'rgba(18, 18, 22, 0.7)',
                            borderBg: 'rgba(255, 255, 255, 0.08)',
                            glow: 'rgba(124, 58, 237, 0.15)',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #14141b;
            color: #FFFFFF;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        /* Glassmorphism custom styling */
        .glass-panel {
            background: rgba(18, 18, 22, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(124, 58, 237, 0.3);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.1);
            transform: translateY(-2px);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #14141b;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.3);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #7C3AED;
        }

        /* Text gradient */
        .text-gradient {
            background: linear-gradient(135deg, #7C3AED 0%, #14B8A6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #7C3AED 0%, #0D9488 100%);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.45);
            transform: scale(1.02);
        }
        /* Estilos de Tema Claro (Light Mode) */
        html.light {
            background-color: #F3F4F6 !important;
        }

        html.light body {
            background-color: #F3F4F6 !important;
            color: #1F2937 !important;
        }

        /* Painel e Card em Vidro Claro */
        html.light .glass-panel {
            background: rgba(255, 255, 255, 0.8) !important;
            border-color: rgba(0, 0, 0, 0.08) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05) !important;
        }

        html.light .glass-card {
            background: rgba(255, 255, 255, 0.9) !important;
            border-color: rgba(0, 0, 0, 0.06) !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02) !important;
        }

        html.light .glass-card:hover {
            border-color: rgba(124, 58, 237, 0.4) !important;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.08) !important;
        }

        /* Sidebar no tema claro */
        html.light aside {
            background: #FFFFFF !important;
            border-color: rgba(0, 0, 0, 0.08) !important;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.02) !important;
        }

        /* Inputs e selects no tema claro */
        html.light input, 
        html.light select, 
        html.light textarea {
            background-color: #FFFFFF !important;
            color: #1F2937 !important;
            border-color: rgba(0, 0, 0, 0.15) !important;
        }

        html.light input::placeholder {
            color: #9CA3AF !important;
        }

        html.light input:focus, 
        html.light select:focus {
            border-color: #7C3AED !important;
            box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.1) !important;
        }

        /* Textos e Cores no tema claro */
        html.light .text-white {
            color: #111827 !important;
        }

        html.light .text-gray-400 {
            color: #4B5563 !important;
        }

        html.light .text-gray-300 {
            color: #374151 !important;
        }

        html.light .text-gray-500 {
            color: #6B7280 !important;
        }

        /* Sub-backgrounds e tabelas */
        html.light .bg-\[\#121215\], 
        html.light .bg-\[\#16161A\],
        html.light .bg-\[\#111115\] {
            background-color: #F9FAFB !important;
        }

        html.light .bg-white\/5 {
            background-color: rgba(0, 0, 0, 0.03) !important;
        }

        html.light .hover\:bg-white\/5:hover {
            background-color: rgba(0, 0, 0, 0.05) !important;
        }

        html.light .divide-white\/5 > * + * {
            border-color: rgba(0, 0, 0, 0.08) !important;
        }

        html.light .border-white\/5 {
            border-color: rgba(0, 0, 0, 0.08) !important;
        }

        html.light .border-white\/15 {
            border-color: rgba(0, 0, 0, 0.12) !important;
        }

        html.light .border-brand-borderBg {
            border-color: rgba(0, 0, 0, 0.08) !important;
        }

        /* Botões */
        html.light .bg-white\/5.text-white {
            background-color: #FFFFFF !important;
            color: #374151 !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
        }

        html.light .bg-white\/5.text-white:hover {
            background-color: rgba(0, 0, 0, 0.02) !important;
        }

        html.light .text-gray-400.hover\:text-white:hover {
            color: #000000 !important;
        }

        /* Títulos de tabelas */
        html.light .bg-white\/5.border-b {
            background-color: rgba(0, 0, 0, 0.02) !important;
            border-color: rgba(0, 0, 0, 0.08) !important;
        }

        html.light ::-webkit-scrollbar-track {
            background: #F3F4F6;
        }
    </style>
    <!-- Chart.js CDN para Gráficos Interativos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Interceptador global de erros para depurar tela branca
        window.addEventListener('error', function(event) {
            const errDiv = document.createElement('div');
            errDiv.style.position = 'fixed';
            errDiv.style.top = '0';
            errDiv.style.left = '0';
            errDiv.style.width = '100%';
            errDiv.style.backgroundColor = '#F43F5E';
            errDiv.style.color = '#FFFFFF';
            errDiv.style.padding = '20px';
            errDiv.style.zIndex = '99999';
            errDiv.style.fontFamily = 'monospace';
            errDiv.style.whiteSpace = 'pre-wrap';
            errDiv.innerHTML = '<h3>🚨 Erro Crítico de Código:</h3>' + event.message + '<br/><br/><strong>Local:</strong> ' + event.filename + ':' + event.lineno + ':' + event.colno + '<br/><br/><strong>Erro:</strong> ' + (event.error ? event.error.stack : 'N/A');
            document.body.appendChild(errDiv);
        });

        const { useState, useEffect, useMemo } = React;

        // --- DADOS INICIAIS DO LOCALSTORAGE (MOCK) ---
        const INITIAL_CHANNELS = [
            { id: 'ml1', name: 'printoustudio3d', commission: 12.0, fixedFee: 6.0, color: '#FFE600', hasFreeShippingThreshold: true, freeShippingThreshold: 79.0, defaultSellerShippingCost: 19.90, defaultBelowThresholdShippingCost: 0.0 },
            { id: 'ml2', name: 'AlucarPrintoustudio3d', commission: 19.5, fixedFee: 6.0, color: '#14B8A6', hasFreeShippingThreshold: true, freeShippingThreshold: 79.0, defaultSellerShippingCost: 19.90, defaultBelowThresholdShippingCost: 0.0 },
            { id: 'shopee', name: 'Shopee', commission: 14.0, fixedFee: 3.0, color: '#EE4D2D', hasFreeShippingThreshold: false, freeShippingThreshold: 0, defaultSellerShippingCost: 0.0, defaultBelowThresholdShippingCost: 0.0 },
            { id: 'site', name: 'Site Próprio', commission: 3.99, fixedFee: 0.5, color: '#0088FF', hasFreeShippingThreshold: false, freeShippingThreshold: 0, defaultSellerShippingCost: 0.0, defaultBelowThresholdShippingCost: 0.0 },
            { id: 'direta', name: 'Venda Direta / Pix', commission: 0.0, fixedFee: 0.0, color: '#30D158', hasFreeShippingThreshold: false, freeShippingThreshold: 0, defaultSellerShippingCost: 0.0, defaultBelowThresholdShippingCost: 0.0 }
        ];

        const INITIAL_PRODUCTS = [];

        const INITIAL_SUPPLIERS = [];

        const INITIAL_FILAMENTS = [];

        const INITIAL_SALES = [];

        const INITIAL_EXPENSES = [];

        function App() {
            // --- ESTADOS DO SISTEMA ---
            const [currentUser, setCurrentUser] = useState(() => {
                const local = localStorage.getItem('printou_user');
                return local ? JSON.parse(local) : null;
            });
            const [activeTab, setActiveTab] = useState('dashboard');
            const [editingProductGlobal, setEditingProductGlobal] = useState(null);
            const [isAddingProductGlobal, setIsAddingProductGlobal] = useState(false);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [theme, setTheme] = useState(() => {
                return localStorage.getItem('printou_theme') || 'light';
            });

            useEffect(() => {
                localStorage.setItem('printou_theme', theme);
                if (theme === 'light') {
                    document.documentElement.classList.add('light');
                } else {
                    document.documentElement.classList.remove('light');
                }
            }, [theme]);

            const [channels, setChannels] = useState(() => {
                const local = localStorage.getItem('printou_channels');
                return local ? JSON.parse(local) : INITIAL_CHANNELS;
            });
            const [products, setProducts] = useState(() => {
                const local = localStorage.getItem('printou_products');
                return local ? JSON.parse(local) : INITIAL_PRODUCTS;
            });
            const [suppliers, setSuppliers] = useState(() => {
                const local = localStorage.getItem('printou_suppliers');
                return local ? JSON.parse(local) : INITIAL_SUPPLIERS;
            });
            const [expenses, setExpenses] = useState(() => {
                const local = localStorage.getItem('printou_expenses');
                return local ? JSON.parse(local) : INITIAL_EXPENSES;
            });
            const [sales, setSales] = useState(() => {
                const local = localStorage.getItem('printou_sales');
                return local ? JSON.parse(local) : INITIAL_SALES;
            });
            const [filaments, setFilaments] = useState(() => {
                const local = localStorage.getItem('printou_filaments');
                return local ? JSON.parse(local) : INITIAL_FILAMENTS;
            });

            const [integrationLogs, setIntegrationLogs] = useState([]);
            const [credentials, setCredentials] = useState({
                mercadolivre: { clientId: '', clientSecret: '', webhookUrl: 'http://localhost:3001/api/webhooks/mercadolivre', status: 'Sincronizado' },
                shopee: { shopId: '', apiKey: '', webhookUrl: 'http://localhost:3001/api/webhooks/shopee', status: 'Sincronizado' }
            });
            const [isLoaded, setIsLoaded] = useState(false);

            // Estados da Assistente Kika
            const [isKikaOpen, setIsKikaOpen] = useState(false);
            const [kikaSearch, setKikaSearch] = useState('');
            const [selectedGuide, setSelectedGuide] = useState(null);

            const refreshDatabaseData = async () => {
                try {
                    const response = await fetch('/api/data');
                    if (response.ok) {
                        const data = await response.json();
                        if (data.sales) setSales(data.sales);
                        if (data.products) setProducts(data.products);
                        if (data.channels) setChannels(data.channels);
                        if (data.suppliers) setSuppliers(data.suppliers);
                        if (data.expenses) setExpenses(data.expenses);
                        if (data.filaments) setFilaments(data.filaments);
                        if (data.integrationLogs) setIntegrationLogs(data.integrationLogs);
                        if (data.credentials) setCredentials(data.credentials);
                    }
                } catch (error) {
                    console.warn("Servidor de banco de dados offline. Usando fallback LocalStorage:", error);
                } finally {
                    setIsLoaded(true);
                }
            };

            // Tenta carregar dados do banco de dados local na inicialização
            useEffect(() => {
                refreshDatabaseData();
            }, []);

            useEffect(() => {
                if (currentUser) {
                    localStorage.setItem('printou_user', JSON.stringify(currentUser));
                } else {
                    localStorage.removeItem('printou_user');
                }
            }, [currentUser]);

            const handleLogout = () => {
                setCurrentUser(null);
            };

            useEffect(() => {
                setIsSidebarOpen(false);
            }, [activeTab]);

            const [selectedMonth, setSelectedMonth] = useState('2026-07');

            const availableMonths = useMemo(() => {
                const months = new Set();
                months.add('2026-07');
                sales.forEach(s => { if (s.date) months.add(s.date.substring(0, 7)); });
                expenses.forEach(e => { if (e.competency) months.add(e.competency); });
                return Array.from(months).sort().reverse();
            }, [sales, expenses]);

            // State do Modal de Nova Venda
            const [isSaleModalOpen, setIsSaleModalOpen] = useState(false);
            const [newSale, setNewSale] = useState({
                channelId: 'direta',
                productId: 'p1',
                quantity: 1,
                grossValue: '',
                shipping: '0.00',
                status: 'Pago'
            });

            // Migração de nomes antigos do Mercado Livre salvos no LocalStorage e ajuste de taxas/fretes
            useEffect(() => {
                let updated = false;
                const newChans = channels.map(c => {
                    let changed = false;
                    let target = { ...c };
                    if (c.id === 'ml1' && (c.name === 'Mercado Livre - Conta 1' || c.commission === 16.5)) {
                        target.name = 'printoustudio3d';
                        target.commission = 12.0;
                        changed = true;
                    }
                    if (c.id === 'ml2' && (c.name === 'Mercado Livre - Conta 2' || c.commission === 12.0)) {
                        target.name = 'AlucarPrintoustudio3d';
                        target.commission = 19.5;
                        target.color = '#14B8A6';
                        changed = true;
                    }
                    // Garantir novas propriedades de frete
                    if (target.hasFreeShippingThreshold === undefined) {
                        const initialRef = INITIAL_CHANNELS.find(ic => ic.id === target.id);
                        if (initialRef) {
                            target.hasFreeShippingThreshold = initialRef.hasFreeShippingThreshold;
                            target.freeShippingThreshold = initialRef.freeShippingThreshold;
                            target.defaultSellerShippingCost = initialRef.defaultSellerShippingCost;
                            target.defaultBelowThresholdShippingCost = initialRef.defaultBelowThresholdShippingCost;
                            changed = true;
                        }
                    }
                    if (changed) updated = true;
                    return target;
                });
                if (updated) {
                    setChannels(newChans);
                }
            }, []);

            // Lógica de cálculo de frete sugerido automático no lançamento de vendas
            useEffect(() => {
                const chan = channels.find(c => c.id === newSale.channelId);
                const prod = products.find(p => p.id === newSale.productId);
                
                if (chan) {
                    const gross = parseFloat(newSale.grossValue) || 0;
                    // Tenta usar o custo de frete específico do produto se configurado, senão usa o padrão do canal
                    const productShipping = (prod && prod.customShippingCost !== undefined && prod.customShippingCost > 0) 
                        ? prod.customShippingCost 
                        : (chan.defaultSellerShippingCost || 0);

                    let suggestedShipping = 0;
                    if (chan.hasFreeShippingThreshold) {
                        if (gross >= chan.freeShippingThreshold) {
                            suggestedShipping = productShipping;
                        } else {
                            suggestedShipping = chan.defaultBelowThresholdShippingCost || 0;
                        }
                    } else {
                        suggestedShipping = productShipping || 0;
                    }
                    
                    if (parseFloat(newSale.shipping) !== suggestedShipping && newSale.shipping !== suggestedShipping.toFixed(2)) {
                        setNewSale(prev => ({ ...prev, shipping: suggestedShipping.toFixed(2) }));
                    }
                }
            }, [newSale.channelId, newSale.grossValue, newSale.productId, channels, products]);

            // Sincronização geral com LocalStorage e Banco de Dados Local (com debounce de 100ms)
            useEffect(() => {
                if (!isLoaded) return;

                localStorage.setItem('printou_channels', JSON.stringify(channels));
                localStorage.setItem('printou_products', JSON.stringify(products));
                localStorage.setItem('printou_sales', JSON.stringify(sales));
                localStorage.setItem('printou_suppliers', JSON.stringify(suppliers));
                localStorage.setItem('printou_expenses', JSON.stringify(expenses));
                localStorage.setItem('printou_filaments', JSON.stringify(filaments));

                const sync = async () => {
                    try {
                        await fetch('/api/data', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                sales,
                                products,
                                channels,
                                suppliers,
                                expenses,
                                filaments
                            })
                        });
                    } catch (err) {
                        // Silencioso: continua usando LocalStorage normalmente se offline
                    }
                };
                const timer = setTimeout(sync, 100);
                return () => clearTimeout(timer);
            }, [channels, products, sales, suppliers, expenses, filaments]);

            // Re-inicializar ícones Lucide
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab, isSaleModalOpen, sales, products, expenses, theme]);

            // --- CÁLCULO DE CUSTO DO PRODUTO (Com Taxa de Perda/Falha ou Custo de Revenda) ---
            const calculateProductCost = (prod) => {
                if (prod.type === 'resale') {
                    return parseFloat((prod.acquisitionCost || 0).toFixed(2));
                }
                const filCost = (prod.weight * prod.filamentCost) / 1000;
                const machCost = prod.printTime * prod.machineHourCost;
                const rateFactor = 1 + ((prod.failRate || 0) / 100);
                const rawCost = (filCost + machCost) * rateFactor;
                return parseFloat((rawCost + prod.finishingCost + prod.packagingCost).toFixed(2));
            };

            // --- LÓGICA DE CÁLCULO FINANCEIRO POR VENDA ---
            const computeSaleFinancials = (sale) => {
                const prod = products.find(p => p.id === sale.productId);
                const chan = channels.find(c => c.id === sale.channelId);
                
                const productCostTotal = prod ? calculateProductCost(prod) * sale.quantity : 0;
                
                let fee = 0;
                if (chan) {
                    let fixedFee = chan.fixedFee;
                    // Regra Mercado Livre: Sem taxa fixa para vendas >= R$ 79
                    if ((chan.id.startsWith('ml') || chan.name.toLowerCase().includes('mercado')) && sale.grossValue >= 79) {
                        fixedFee = 0;
                    }
                    fee = (sale.grossValue * (chan.commission / 100)) + fixedFee;
                }
                
                // Se o frete registrado for 0, usa a regra configurada do canal/produto como fallback
                let shipping = parseFloat(sale.shipping) || 0;
                if (shipping === 0 && chan) {
                    const productShipping = (prod && prod.customShippingCost !== undefined && prod.customShippingCost > 0)
                        ? prod.customShippingCost
                        : (chan.defaultSellerShippingCost || 0);

                    if (chan.hasFreeShippingThreshold) {
                        if (sale.grossValue >= chan.freeShippingThreshold) {
                            shipping = productShipping;
                        } else {
                            shipping = chan.defaultBelowThresholdShippingCost || 0;
                        }
                    } else {
                        shipping = productShipping || 0;
                    }
                }
                
                const netProfit = sale.status === 'Cancelado' ? 0 : parseFloat((sale.grossValue - fee - productCostTotal - shipping).toFixed(2));
                
                return {
                    productCost: productCostTotal,
                    fees: fee,
                    netProfit: netProfit,
                    shippingApplied: shipping
                };
            };

            // --- METRICAS GERAIS PARA O DASHBOARD ---
            const financeStats = useMemo(() => {
                let totalGross = 0;
                let totalNet = 0;
                let totalFees = 0;
                let totalShipping = 0;
                let activeSalesCount = 0;

                const filteredSales = sales.filter(s => s.date.startsWith(selectedMonth));

                filteredSales.forEach(sale => {
                    if (sale.status !== 'Cancelado') {
                        const fin = computeSaleFinancials(sale);
                        totalGross += sale.grossValue;
                        totalNet += fin.netProfit;
                        totalFees += fin.fees;
                        totalShipping += fin.shippingApplied;
                        activeSalesCount++;
                    }
                });

                const filteredExpenses = expenses.filter(e => e.competency === selectedMonth);
                const totalAdmExpenses = filteredExpenses.reduce((acc, curr) => acc + curr.value, 0);
                const companyRealNet = totalNet - totalAdmExpenses;
                const averageMargin = totalGross > 0 ? (totalNet / totalGross) * 100 : 0;

                const profitRate = totalGross > 0 ? totalNet / totalGross : 0;
                const breakevenSalesValue = profitRate > 0 ? totalAdmExpenses / profitRate : 0;
                const breakevenProgress = breakevenSalesValue > 0 ? Math.min((totalGross / breakevenSalesValue) * 100, 100) : (totalGross > 0 && totalAdmExpenses === 0 ? 100 : 0);

                return {
                    gross: totalGross,
                    net: totalNet,
                    fees: totalFees,
                    shipping: totalShipping,
                    count: activeSalesCount,
                    margin: averageMargin,
                    admExpenses: totalAdmExpenses,
                    companyRealNet: companyRealNet,
                    breakevenTarget: breakevenSalesValue,
                    breakevenProgress: breakevenProgress
                };
            }, [sales, products, channels, expenses, selectedMonth]);

            // --- AUXILIAR: REGISTRAR VENDA E DEDUZIR ESTOQUE ---
            const registerSaleAndDeductStock = (saleToAdd) => {
                setSales(prevSales => [saleToAdd, ...prevSales]);
                
                if (saleToAdd.status !== 'Cancelado') {
                    // Busca o produto correspondente para ver se consome filamento
                    const prod = products.find(p => p.id === saleToAdd.productId);
                    if (prod && prod.type === '3d' && prod.filamentId) {
                        setFilaments(prevFilaments => prevFilaments.map(fil => {
                            if (fil.id === prod.filamentId) {
                                return { 
                                    ...fil, 
                                    currentWeight: Math.max(0, parseFloat((fil.currentWeight - (prod.weight * saleToAdd.quantity)).toFixed(1)))
                                };
                            }
                            return fil;
                        }));
                    }
                }
            };

            // --- ADICIONAR NOVA VENDA ---
            const handleAddSale = (e) => {
                e.preventDefault();
                const saleToAdd = {
                    id: 's' + (sales.length + 1) + Date.now().toString().slice(-3),
                    date: new Date().toISOString(),
                    channelId: newSale.channelId,
                    productId: newSale.productId,
                    quantity: parseInt(newSale.quantity),
                    grossValue: parseFloat(newSale.grossValue),
                    shipping: parseFloat(newSale.shipping) || 0,
                    status: newSale.status
                };

                registerSaleAndDeductStock(saleToAdd);
                setIsSaleModalOpen(false);
                // Reset form
                setNewSale({
                    channelId: 'direta',
                    productId: products[0]?.id || '',
                    quantity: 1,
                    grossValue: '',
                    shipping: '0.00',
                    status: 'Pago'
                });
            };

            const handleIncomingMarketplaceSale = (saleData) => {
                // 1. Verifica se o produto existe
                const productExists = products.find(p => p.id === saleData.productId);
                if (!productExists) {

                let fixedFee = chan.fixedFee;
                if ((chan.id.startsWith('ml') || chan.name.toLowerCase().includes('mercado')) && val >= 79) {
                    fixedFee = 0;
                }
                return (val * (chan.commission / 100)) + fixedFee;
            }

            function calculateEstimatedCost() {
                const prod = products.find(p => p.id === newSale.productId);
                if (!prod) return 0;
                return calculateProductCost(prod) * (parseInt(newSale.quantity) || 1);
            }

        // --- COMPONENTE DE GRÁFICOS INTERATIVOS (CHART.JS) ---
        function DashboardChartsView({ sales, channels, compute, selectedMonth }) {
            const lineCanvasRef = React.useRef(null);
            const doughnutCanvasRef = React.useRef(null);
            const lineChartRef = React.useRef(null);
            const doughnutChartRef = React.useRef(null);

            React.useEffect(() => {
                if (lineChartRef.current) lineChartRef.current.destroy();
                if (doughnutChartRef.current) doughnutChartRef.current.destroy();

                // 1. Evolução Mensal
                const monthlyStats = {};
                sales.forEach(sale => {
                    if (sale.status !== 'Cancelado' && sale.date) {
                        const month = sale.date.substring(0, 7);
                        if (!monthlyStats[month]) {
                            monthlyStats[month] = { gross: 0, net: 0 };
                        }
                        const fin = compute(sale);
                        monthlyStats[month].gross += sale.grossValue;
                        monthlyStats[month].net += fin.netProfit;
                    }
                });

                const sortedMonths = Object.keys(monthlyStats).sort();
                const labels = sortedMonths.map(m => {
                    const [year, month] = m.split('-');
                    const monthsNames = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
                    return `${monthsNames[parseInt(month) - 1]} / ${year}`;
                });

                const grossData = sortedMonths.map(m => monthlyStats[m].gross);
                const netData = sortedMonths.map(m => monthlyStats[m].net);

                if (lineCanvasRef.current) {
                    const ctx = lineCanvasRef.current.getContext('2d');
                    lineChartRef.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels,
                            datasets: [
                                {
                                    label: 'Faturamento Bruto',
                                    data: grossData,
                                    borderColor: '#3B82F6',
                                    backgroundColor: 'rgba(59, 130, 246, 0.08)',
                                    fill: true,
                                    tension: 0.4,
                                    borderWidth: 3,
                                    pointBackgroundColor: '#3B82F6'
                                },
                                {
                                    label: 'Lucro Líquido',
                                    data: netData,
                                    borderColor: '#10B981',
                                    backgroundColor: 'rgba(16, 185, 129, 0.08)',
                                    fill: true,
                                    tension: 0.4,
                                    borderWidth: 3,
                                    pointBackgroundColor: '#10B981'
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    labels: { color: '#9CA3AF', font: { weight: 'bold', family: 'Inter' } }
                                }
                            },
                            scales: {
                                x: { grid: { display: false }, ticks: { color: '#9CA3AF' } },
                                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#9CA3AF' } }
                            }
                        }
                    });
                }

                // 2. Distribuição por Canal
                const counts = {};
                channels.forEach(c => { counts[c.id] = 0; });
                sales.forEach(sale => {
                    if (sale.status !== 'Cancelado' && sale.date && sale.date.startsWith(selectedMonth)) {
                        counts[sale.channelId] = (counts[sale.channelId] || 0) + sale.grossValue;
                    }
                });

                const chanLabels = [];
                const chanData = [];
                const chanColors = [];

                channels.forEach(c => {
                    if (counts[c.id] > 0) {
                        chanLabels.push(c.name);
                        chanData.push(parseFloat(counts[c.id].toFixed(2)));
                        chanColors.push(c.color || '#888888');
                    }
                });

                if (doughnutCanvasRef.current) {
                    const ctx = doughnutCanvasRef.current.getContext('2d');
                    doughnutChartRef.current = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: chanData.length > 0 ? chanLabels : ['Sem Vendas'],
                            datasets: [{
                                data: chanData.length > 0 ? chanData : [1],
                                backgroundColor: chanData.length > 0 ? chanColors : ['rgba(255,255,255,0.05)'],
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'bottom',
                                    labels: { color: '#9CA3AF', font: { weight: 'bold', family: 'Inter' } }
                                }
                            },
                            cutout: '70%'
                        }
                    });
                }

                return () => {
                    if (lineChartRef.current) lineChartRef.current.destroy();
                    if (doughnutChartRef.current) doughnutChartRef.current.destroy();
                };
            }, [sales, channels, selectedMonth]);

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="lg:col-span-2 glass-panel rounded-2xl p-6 border border-white/5 flex flex-col justify-between">
                        <div>
                            <span className="text-[10px] font-extrabold uppercase tracking-widest text-brand-orange">Desempenho</span>
                            <h4 className="font-extrabold text-white text-lg mt-1">Evolução Mensal de Receitas e Margens</h4>
                        </div>
                        <div className="h-64 mt-6 relative">
                            <canvas ref={lineCanvasRef}></canvas>
                        </div>
                    </div>

                    <div className="glass-panel rounded-2xl p-6 border border-white/5 flex flex-col justify-between">
                        <div>
                            <span className="text-[10px] font-extrabold uppercase tracking-widest text-brand-orange">Participação</span>
                            <h4 className="font-extrabold text-white text-lg mt-1">Distribuição por Canal</h4>
                        </div>
                        <div className="h-64 mt-6 relative">
                            <canvas ref={doughnutCanvasRef}></canvas>
                        </div>
                    </div>
                </div>
            );
        }

        // --- ABA 2: LISTA DE VENDAS E CONTROLE ---
        function SalesListView({ sales, products, channels, setSales, setProducts, compute }) {
            const [selectedStatusFilter, setSelectedStatusFilter] = useState('Todos');
            const [editingProductFromSales, setEditingProductFromSales] = useState(null);

            const filteredSales = useMemo(() => {
                let result = sales;
                if (selectedStatusFilter !== 'Todos') {
                    result = sales.filter(s => s.status === selectedStatusFilter);
                }
                return [...result].sort((a, b) => {
                    const dateCompare = (b.date || '').localeCompare(a.date || '');
                    if (dateCompare !== 0) return dateCompare;
                    return (b.id || '').localeCompare(a.id || '');
                });
            }, [sales, selectedStatusFilter]);

            const handleDelete = (id) => {
                if (confirm("Deseja realmente excluir esta venda?")) {
                    setSales(sales.filter(s => s.id !== id));
                }
            };

            const toggleCancel = (id) => {
                setSales(sales.map(s => {
                    if (s.id === id) {
                        return { ...s, status: s.status === 'Cancelado' ? 'Pago' : 'Cancelado' };
                    }
                    return s;
                }));
            };

            return (
                <div className="glass-panel rounded-2xl p-6 overflow-hidden">

                        <h3 className="font-black text-xl text-gradient">Registro Geral de Vendas</h3>

                                <button

                                    {status}
                                </button>

                        </div>
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="border-b border-brand-borderBg text-xs font-bold text-gray-400 uppercase">
                                    <th className="pb-3">Data / Hora</th>
                                    <th className="pb-3">Canal</th>
                                    <th className="pb-3">Produto</th>
                                    <th className="pb-3 text-center">Qtd</th>
                                    <th className="pb-3 text-right">Faturado (Bruto)</th>
                                    <th className="pb-3 text-right">Taxas Canal</th>
                                    <th className="pb-3 text-right">Frete Cobrado</th>
                                    <th className="pb-3 text-right">Custo Prod.</th>
                                    <th className="pb-3 text-right">Lucro Líquido</th>
                                    <th className="pb-3 text-center">Status</th>
                                    <th className="pb-3 text-right">Ações</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-brand-borderBg text-sm">
                                {filteredSales.map(sale => {
                                    const prod = products.find(p => p.id === sale.productId);
                                    const chan = channels.find(c => c.id === sale.channelId);
                                    const fin = compute(sale);
                                    
                                    // Formatação amigável de data e hora
                                    let dateDisplay = sale.date;
                                    let timeDisplay = '--:--';
                                    if (sale.date && sale.date.includes('T')) {
                                        try {
                                            const dObj = new Date(sale.date);
                                            const day = String(dObj.getDate()).padStart(2, '0');
                                            const month = String(dObj.getMonth() + 1).padStart(2, '0');
                                            const year = dObj.getFullYear();
                                            const hours = String(dObj.getHours()).padStart(2, '0');
                                            const minutes = String(dObj.getMinutes()).padStart(2, '0');
                                            dateDisplay = `${day}/${month}/${year}`;
                                            timeDisplay = `${hours}:${minutes}`;
                                        } catch (e) {
                                            // Fallback
                                        }
                                    } else if (sale.date) {
                                        // Formato antigo YYYY-MM-DD
                                        const p = sale.date.split('-');
                                        if (p.length === 3) {
                                            dateDisplay = `${p[2]}/${p[1]}/${p[0]}`;
                                        }
                                    }

                                    return (
                                        <tr key={sale.id} className="hover:bg-white/[0.02] transition-colors">
                                            <td className="py-4 text-xs font-bold text-gray-400">
                                                <span>{dateDisplay}</span>
                                                {timeDisplay !== '--:--' && <span className="text-[10px] text-gray-500 font-normal ml-2">({timeDisplay})</span>}
                                            </td>
                                            <td className="py-4 font-semibold" style={{ color: chan?.color }}>
                                                {chan?.name || 'Excluído'}
                                            </td>
                                            <td className="py-4 font-bold text-white">
                                                <div className="flex items-center gap-2 group/prod">
                                                    <span>{prod?.name || 'Excluído'}</span>
                                                    {prod && (
                                                        <button 
                                                            onClick={() => setEditingProductFromSales({ ...prod, customShippingCost: prod.customShippingCost !== undefined ? String(prod.customShippingCost) : '0.00' })}
                                                            className="p-1 hover:bg-brand-orange/20 text-gray-500 hover:text-brand-orange rounded transition-all opacity-0 group-hover/prod:opacity-100 focus:opacity-100"
                                                            title="Editar dados deste produto (Frete, Custos, etc.)"
                                                        >
                                                            <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                                                                <path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                                            </svg>
                                                        </button>
                                                    )}
                                                </div>
                                            </td>
                                            <td className="py-4 text-center font-bold">{sale.quantity}</td>
                                            <td className="py-4 text-right font-bold text-white">R$ {sale.grossValue.toFixed(2)}</td>
                                            <td className="py-4 text-right text-rose-400">R$ {fin.fees.toFixed(2)}</td>
                                            <td className="py-4 text-right text-amber-400 font-semibold">R$ {(fin.shippingApplied || 0).toFixed(2)}</td>
                                            <td className="py-4 text-right text-gray-400">R$ {fin.productCost.toFixed(2)}</td>
                                            <td className={`py-4 text-right font-black ${sale.status === 'Cancelado' ? 'text-gray-500 line-through' : 'text-emerald-400'}`}>
                                                R$ {fin.netProfit.toFixed(2)}
                                            </td>
                                            <td className="py-4 text-center">
                                                <span className={`text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-wider ${
                                                    sale.status === 'Entregue' ? 'bg-emerald-500/10 text-emerald-400' :
                                                    sale.status === 'Enviado' ? 'bg-blue-500/10 text-blue-400' :
                                                    sale.status === 'Cancelado' ? 'bg-rose-500/10 text-rose-400' :
                                                    'bg-yellow-500/10 text-yellow-400'
                                                }`}>
                                                    {sale.status}
                                                </span>
                                            </td>
                                            <td className="py-4 text-right space-x-2">
                                                <button 
                                                    onClick={() => toggleCancel(sale.id)}
                                                    className="p-1.5 hover:bg-white/10 rounded-lg text-gray-400 hover:text-white"
                                                    title={sale.status === 'Cancelado' ? "Reativar" : "Estornar/Cancelar"}
                                                >
                                                    <i data-lucide={sale.status === 'Cancelado' ? "rotate-ccw" : "ban"} className="w-4 h-4"></i>
                                                </button>
                                                <button 
                                                    onClick={() => handleDelete(sale.id)}
                                                    className="p-1.5 hover:bg-rose-500/20 rounded-lg text-gray-400 hover:text-rose-400"
                                                    title="Excluir"
                                                >
                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>

                    {/* Modal de Edição Rápida de Produto na Aba de Vendas */}
                    {editingProductFromSales && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center p-4 z-50 animate-fade-in">
                            <div className="bg-[#121215] border border-white/10 rounded-2xl w-full max-w-md p-6 relative shadow-2xl animate-scale-up">
                                <button 
                                    type="button"
                                    onClick={() => setEditingProductFromSales(null)}
                                    className="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors"
                                >
                                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                                
                                <span className="text-xs font-bold tracking-widest text-brand-orange uppercase">Ajuste Rápido de Produto</span>
                                <h4 className="font-extrabold text-white text-lg mt-1 mb-5">
                                    Editar Produto
                                </h4>
                                
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    setProducts(products.map(p => p.id === editingProductFromSales.id ? {
                                        ...p,
                                        name: editingProductFromSales.name,
                                        customShippingCost: parseFloat(editingProductFromSales.customShippingCost) || 0
                                    } : p));
                                    setEditingProductFromSales(null);
                                }} className="space-y-4">
                                    <div>
                                        <label className="block text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mb-1.5">Nome do Anúncio / Produto</label>
                                        <input 
                                            type="text" required
                                            value={editingProductFromSales.name}
                                            onChange={e => setEditingProductFromSales({ ...editingProductFromSales, name: e.target.value })}
                                            className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange font-bold text-sm"
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="block text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mb-1.5">Frete Pago no Canal / ML (R$)</label>
                                        <input 
                                            type="number" step="0.01" required
                                            value={editingProductFromSales.customShippingCost}
                                            onChange={e => setEditingProductFromSales({ ...editingProductFromSales, customShippingCost: e.target.value })}
                                            className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange font-bold text-sm"
                                        />

                                    <button

                                        className="w-full btn-gradient py-3.5 rounded-xl font-extrabold text-black uppercase tracking-widest text-xs mt-2"

        // --- ABA 3: CATALOGO DE PRODUTOS & FICHAS TECNICAS (DESIGN CLEAN & PREMIUM) ---
        function ProductCatalogView({ products, setProducts, calculateCost, filaments = [] }) {
            const [isAdding, setIsAdding] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);
            const [newProduct, setNewProduct] = useState({
                name: '',
                type: '3d', // '3d' ou 'resale'
                weight: '',
                printTime: '',
                filamentCost: '95.00',
                machineHourCost: '2.00',
                finishingCost: '2.00',
                packagingCost: '2.50',
                failRate: '10',
                acquisitionCost: '',
                customShippingCost: '0.00',
                filamentId: filaments[0]?.id || '',
                image: ''
            });

            const handleImageUpload = (e, isEdit = false) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        if (isEdit) {
                            setEditingProduct(prev => ({ ...prev, image: reader.result }));
                        } else {
                            setNewProduct(prev => ({ ...prev, image: reader.result }));
                        }
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSaveProduct = (e) => {
                e.preventDefault();
                const prod = {
                    id: 'p' + (products.length + 1) + Date.now().toString().slice(-2),
                    name: newProduct.name,
                    type: newProduct.type,
                    weight: newProduct.type === '3d' ? parseFloat(newProduct.weight) : 0,
                    printTime: newProduct.type === '3d' ? parseFloat(newProduct.printTime) : 0,
                    filamentCost: newProduct.type === '3d' ? parseFloat(newProduct.filamentCost) : 0,
                    machineHourCost: newProduct.type === '3d' ? parseFloat(newProduct.machineHourCost) : 0,
                    finishingCost: newProduct.type === '3d' ? parseFloat(newProduct.finishingCost) : 0,
                    packagingCost: newProduct.type === '3d' ? parseFloat(newProduct.packagingCost) : 0,
                    failRate: newProduct.type === '3d' ? parseFloat(newProduct.failRate) || 0 : 0,
                    acquisitionCost: newProduct.type === 'resale' ? parseFloat(newProduct.acquisitionCost) : 0,
                    customShippingCost: parseFloat(newProduct.customShippingCost) || 0,
                    filamentId: newProduct.type === '3d' ? newProduct.filamentId : undefined,
                    image: newProduct.image || ''
                };

                setProducts([...products, prod]);
                setIsAdding(false);
                setNewProduct({
                    name: '',
                    type: '3d',
                    weight: '',
                    printTime: '',
                    filamentCost: '95.00',
                    machineHourCost: '2.00',
                    finishingCost: '2.00',
                    packagingCost: '2.50',
                    failRate: '10',
                    acquisitionCost: '',
                    customShippingCost: '0.00',
                    filamentId: filaments[0]?.id || '',
                    image: ''
                });
            };

            const handleUpdateProduct = (e) => {
                e.preventDefault();
                setProducts(products.map(p => p.id === editingProduct.id ? {
                    ...p,
                    name: editingProduct.name,
                    type: editingProduct.type,
                    weight: editingProduct.type === '3d' ? parseFloat(editingProduct.weight) : 0,
                    printTime: editingProduct.type === '3d' ? parseFloat(editingProduct.printTime) : 0,
                    filamentCost: editingProduct.type === '3d' ? parseFloat(editingProduct.filamentCost) : 0,
                    machineHourCost: editingProduct.type === '3d' ? parseFloat(editingProduct.machineHourCost) : 0,
                    finishingCost: editingProduct.type === '3d' ? parseFloat(editingProduct.finishingCost) : 0,
                    packagingCost: editingProduct.type === '3d' ? parseFloat(editingProduct.packagingCost) : 0,
                    failRate: editingProduct.type === '3d' ? parseFloat(editingProduct.failRate) || 0 : 0,
                    acquisitionCost: editingProduct.type === 'resale' ? parseFloat(editingProduct.acquisitionCost) : 0,
                    customShippingCost: parseFloat(editingProduct.customShippingCost) || 0,
                    filamentId: editingProduct.type === '3d' ? editingProduct.filamentId : undefined,
                    image: editingProduct.image || '',
                    isPendingConfig: false
                } : p));
                setEditingProduct(null);
                setIsAdding(false);
            };

            const handleStartEditProduct = (prod) => {
                setEditingProduct({
                    ...prod,
                    weight: prod.weight !== undefined ? String(prod.weight) : '',
                    printTime: prod.printTime !== undefined ? String(prod.printTime) : '',
                    filamentCost: prod.filamentCost !== undefined ? String(prod.filamentCost) : '95.00',
                    machineHourCost: prod.machineHourCost !== undefined ? String(prod.machineHourCost) : '2.00',
                    finishingCost: prod.finishingCost !== undefined ? String(prod.finishingCost) : '2.00',
                    packagingCost: prod.packagingCost !== undefined ? String(prod.packagingCost) : '2.50',
                    failRate: prod.failRate !== undefined ? String(prod.failRate) : '10',
                    acquisitionCost: prod.acquisitionCost !== undefined ? String(prod.acquisitionCost) : '',
                    customShippingCost: prod.customShippingCost !== undefined ? String(prod.customShippingCost) : '0.00',
                    filamentId: prod.filamentId || filaments[0]?.id || '',
                    image: prod.image || ''
                });
                setIsAdding(true);
            };

            const handleDeleteProduct = (id) => {
                if (confirm("Atenção: Vendas vinculadas a este produto perderão as referências. Confirmar exclusão?")) {
                    setProducts(products.filter(p => p.id !== id));
                }
            };

            const activeForm = editingProduct || newProduct;
            const isEditing = !!editingProduct;

            return (
                <div className="space-y-8 animate-fade-in">
                    {/* Header da Aba */}
                    <div className="flex justify-between items-center border-b border-brand-borderBg pb-4">
                        <div>
                            <span className="text-xs font-bold tracking-widest text-brand-orange uppercase">Engenharia de Produto</span>
                            <h3 className="font-black text-2xl text-gradient">Produtos & Custos</h3>
                        </div>
                        <button 
                            onClick={() => {
                                if (isEditing) {
                                    setEditingProduct(null);
                                }
                                setIsAdding(!isAdding);
                            }}
                            className="bg-brand-orange/10 border border-brand-orange/40 hover:bg-brand-orange/20 text-brand-orange px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition-all"
                        >
                            <i data-lucide={isAdding ? "minus" : "plus"} className="w-4 h-4"></i>
                            {isAdding ? "Fechar Painel" : "Cadastrar Novo Item"}
                        </button>
                    </div>

                    {isAdding && (
                        <form onSubmit={isEditing ? handleUpdateProduct : handleSaveProduct} className="glass-panel border border-white/15 rounded-2xl p-6 grid grid-cols-1 md:grid-cols-4 gap-5 animate-fade-in shadow-2xl">
                            <h4 className="md:col-span-4 font-extrabold text-white text-sm uppercase tracking-wider border-b border-white/5 pb-2 flex justify-between items-center">
                                <span>{isEditing ? `📝 Editar Produto (SKU: ${editingProduct.id})` : "✨ Cadastrar Novo Produto"}</span>
                                {isEditing && (
                                    <button 
                                        type="button" 
                                        onClick={() => { setEditingProduct(null); setIsAdding(false); }}
                                        className="text-xs text-rose-400 hover:text-rose-300 font-bold uppercase tracking-widest"
                                    >
                                        Cancelar Edição
                                    </button>
                                )}
                            </h4>
                            <div className="md:col-span-2">
                                <label className="block text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mb-2">Nome Comercial do Item</label>
                                <input 
                                    type="text" 
                                    required
                                    placeholder="Ex: Groot 15cm, Vaso Espiral"
                                    value={activeForm.name}
                                    onChange={e => {
                                        if (isEditing) setEditingProduct({ ...editingProduct, name: e.target.value });
                                        else setNewProduct({ ...newProduct, name: e.target.value });
                                    }}
                                    className="w-full bg-[#16161A] border border-brand-borderBg text-white rounded-xl p-3 focus:outline-none focus:border-brand-orange transition-all placeholder-gray-600"
                                />
                            </div>

                            <div className="md:col-span-2">
                                <label className="block text-[10px] font-extrabold text-gray-400 uppercase tracking-widest mb-2">Categoria de Custos</label>
                                <div className="grid grid-cols-2 gap-3">
                                    <button 
                                        type="button"
                                        onClick={() => {
                                            if (isEditing) setEditingProduct({ ...editingProduct, type: '3d' });
                                            else setNewProduct({ ...newProduct, type: '3d' });
                                        }}
                                        className={`py-3 rounded-xl border text-xs font-bold uppercase tracking-wider transition-all ${activeForm.type === '3d' ? 'bg-brand-orange/20 border-brand-orange text-white' : 'bg-[#16161A] border-brand-borderBg text-gray-400'}`}
                                    >
                                        Peça Impressa 3D
                                    </button>
                                    <button 
                                        type="button"
                                        onClick={() => {
                                            if (isEditing) setEditingProduct({ ...editingProduct, type: 'resale' });

        // --- COMPONENTE DE PRECIFIÇÃO E ORÇAMENTOS ---
        function PricingSimulatorView({ channels, filaments, onAddProduct, setActiveTab }) {
            const [type, setType] = useState('3d');
            const [name, setName] = useState('');
            
            const [weight, setWeight] = useState('100');
            const [printTime, setPrintTime] = useState('5');
            const [selectedFilamentId, setSelectedFilamentId] = useState(filaments[0]?.id || '');
            const [filamentPrice, setFilamentPrice] = useState('95.00');
            const [machineHour, setMachineHour] = useState('2.00');
            const [failRate, setFailRate] = useState('10');
            const [finishing, setFinishing] = useState('3.00');
            const [packaging, setPackaging] = useState('2.50');

            const [acquisitionCost, setAcquisitionCost] = useState('50.00');
            const [customShippingCost, setCustomShippingCost] = useState('0.00');
            const [customSalePrice, setCustomSalePrice] = useState('150.00');

            React.useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [type]);

            const handleFilamentChange = (e) => {
                const fid = e.target.value;
                setSelectedFilamentId(fid);
                const fil = filaments.find(f => f.id === fid);
                if (fil) {
                    if (fil.name.includes('Vermelho')) setFilamentPrice('110.00');
                    else if (fil.name.includes('Branco')) setFilamentPrice('85.00');
                    else setFilamentPrice('95.00');
                }
            };

            const calculatedCost = useMemo(() => {
                if (type === 'resale') {
                    return parseFloat(acquisitionCost) || 0;
                }
                const w = parseFloat(weight) || 0;
                const t = parseFloat(printTime) || 0;
                const fPrice = parseFloat(filamentPrice) || 0;
                const mHour = parseFloat(machineHour) || 0;
                const fRate = parseFloat(failRate) || 0;
                const fin = parseFloat(finishing) || 0;
                const pack = parseFloat(packaging) || 0;

                const filCost = (w * fPrice) / 1000;
                const machCost = t * mHour;
                const rateFactor = 1 + (fRate / 100);
                const rawCost = (filCost + machCost) * rateFactor;
                
                return parseFloat((rawCost + fin + pack).toFixed(2));
            }, [type, weight, printTime, filamentPrice, machineHour, failRate, finishing, packaging, acquisitionCost]);

            const markups = [
                { label: 'Margem Segura (2.0x)', multiplier: 2.0 },
                { label: 'Margem Média (2.5x)', multiplier: 2.5 },
                { label: 'Recomendado (3.0x)', multiplier: 3.0 },
                { label: 'Alta Lucratividade (3.5x)', multiplier: 3.5 }
            ];

            const channelSimulations = useMemo(() => {
                const saleVal = parseFloat(customSalePrice) || 0;
                const simShipping = parseFloat(customShippingCost) || 0;
                return channels.map(chan => {
                    let fixedFee = chan.fixedFee;
                    if ((chan.id.startsWith('ml') || chan.name.toLowerCase().includes('mercado')) && saleVal >= 79) {
                        fixedFee = 0;
                    }
                    const commissionFee = (saleVal * (chan.commission / 100)) + fixedFee;
                    
                    let shippingFee = 0;
                    if (chan.hasFreeShippingThreshold) {
                        if (saleVal >= chan.freeShippingThreshold) {
                            shippingFee = simShipping > 0 ? simShipping : chan.defaultSellerShippingCost;
                        } else {
                            shippingFee = chan.defaultBelowThresholdShippingCost;
                        }
                    } else {
                        shippingFee = simShipping > 0 ? simShipping : (chan.defaultSellerShippingCost || 0);
                    }

                    const netProfit = saleVal - commissionFee - shippingFee - calculatedCost;
                    const marginPercent = saleVal > 0 ? (netProfit / saleVal) * 100 : 0;

                    return {
                        ...chan,
                        commissionFee,
                        shippingFee,
                        totalFees: commissionFee + shippingFee,
                        netProfit,
                        marginPercent
                    };
                });
            }, [channels, customSalePrice, customShippingCost, calculatedCost]);

            const handleSaveAsProduct = () => {
                if (!name.trim()) {
                    alert('Por favor, informe o nome do produto para salvá-lo no catálogo.');
                    return;
                }

                const productData = {
                    id: 'p_sim_' + Date.now().toString().slice(-4),
                    name: name.trim(),
                    type,
                    weight: type === '3d' ? parseFloat(weight) || 0 : undefined,
                    printTime: type === '3d' ? parseFloat(printTime) || 0 : undefined,
                    filamentCost: type === '3d' ? parseFloat(filamentPrice) || 0 : undefined,
                    machineHourCost: type === '3d' ? parseFloat(machineHour) || 0 : undefined,
                    finishingCost: type === '3d' ? parseFloat(finishing) || 0 : undefined,
                    packagingCost: type === '3d' ? parseFloat(packaging) || 0 : undefined,
                    failRate: type === '3d' ? parseFloat(failRate) || 0 : undefined,
                    filamentId: type === '3d' ? selectedFilamentId : undefined,
                    acquisitionCost: type === 'resale' ? parseFloat(acquisitionCost) || 0 : undefined,
                    customShippingCost: parseFloat(customShippingCost) || 0
                };

                onAddProduct(productData);
                alert(`Produto "${name}" cadastrado com sucesso no catálogo! Redirecionando...`);
                setActiveTab('products');
            };

            return (
                <div className="space-y-8">
                    <div>
                        <span className="text-xs font-bold tracking-widest text-brand-orange uppercase">Engenharia Financeira</span>
                        <h3 className="font-black text-2xl text-gradient">Simulador de Precificação e Orçamentos</h3>

        // --- VIEW DE RELATÓRIOS & INSIGHTS ---
        function ReportsView({ sales, products, channels, compute, selectedMonth, expenses }) {
            // Cálculo de produtos mais vendidos
            const topProducts = useMemo(() => {
                const map = {};
                sales.forEach(sale => {
                    if (sale.status !== 'Cancelado') {
                        map[sale.productId] = (map[sale.productId] || 0) + sale.quantity;
                    }
                });
                return Object.entries(map).map(([id, qty]) => {
                    const prod = products.find(p => p.id === id);
                    return { name: prod?.name || 'Excluído', qty };
                }).sort((a, b) => b.qty - a.qty).slice(0, 5);
            }, [sales, products]);

            // Margem por produto (ajustado para suportar revenda e 3d dinamicamente)
            const bestMargins = useMemo(() => {
                return products.map(prod => {
                    const cost = prod.type === 'resale' 
                        ? (prod.acquisitionCost || 0)
                        : ((prod.weight * prod.filamentCost) / 1000 + (prod.printTime * prod.machineHourCost) + prod.finishingCost + prod.packagingCost);
                    const defaultSaleValue = 60.0;
                    const averageFee = (defaultSaleValue * 0.12) + 4.0;
                    const estimatedProfit = defaultSaleValue - averageFee - cost;
                    const marginPercent = defaultSaleValue > 0 ? (estimatedProfit / defaultSaleValue) * 100 : 0;
                    return { name: prod.name, margin: marginPercent, profit: estimatedProfit, cost };
                }).sort((a, b) => b.margin - a.margin);
            }, [products]);

            // Divisão de Vendas por Canal
            const channelStats = useMemo(() => {
                const stats = {};
                sales.forEach(sale => {
                    if (sale.status !== 'Cancelado') {
                        stats[sale.channelId] = (stats[sale.channelId] || 0) + 1;
                    }
                });
                return Object.entries(stats).map(([id, count]) => {
                    const chan = channels.find(c => c.id === id);
                    return { name: chan?.name || 'Outro', count, color: chan?.color || '#888' };
                });
            }, [sales, channels]);

            // --- CÁLCULOS DO DRE DO MÊS SELECIONADO ---
            const dreStats = useMemo(() => {
                let totalGross = 0;
                let totalCost = 0;
                let totalFees = 0;
                let totalShipping = 0;
                let activeSalesCount = 0;

                const filteredSales = sales.filter(s => s.date.startsWith(selectedMonth));
                filteredSales.forEach(sale => {
                    if (sale.status !== 'Cancelado') {
                        const fin = compute(sale);
                        totalGross += sale.grossValue;
                        totalCost += fin.productCost;
                        totalFees += fin.fees;
                        totalShipping += (fin.shippingApplied || 0);
                        activeSalesCount++;
                    }
                });

                const filteredExpenses = expenses.filter(e => e.competency === selectedMonth);

                return {
                    gross: totalGross,
                    cost: totalCost,
                    fees: totalFees,
                    shipping: totalShipping,
                    admExpenses: totalAdmExpenses,
                    salesProfit: netProfitVendas,

                fetchConfig();
                fetchProducts();
                fetchMessages();

                setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 50);
            }, [activeTab, shopifyProducts, messages, selectedMessage]);

            const showMessage = (msg, isError = false) => {
                if (isError) {
                    setErrorMessage(msg);
                    setTimeout(() => setErrorMessage(''), 5000);
                } else {
                    setSuccessMessage(msg);
                    setTimeout(() => setSuccessMessage(''), 5000);
                }
            };

            const fetchConfig = async () => {
                try {
                    const res = await fetch('/api/facebook/config');
                    if (res.ok) {
                        const data = await res.json();
                        setConfig(data);
                    }
                } catch (e) {
                    console.error(e);
                }
            };

            const fetchProducts = async () => {
                setIsLoadingProducts(true);
                try {
                    const res = await fetch('/api/facebook/products');
                    if (res.ok) {
                        const data = await res.json();
                        setShopifyProducts(data);
                    }
                } catch (e) {
                    console.error(e);
                } finally {
                    setIsLoadingProducts(false);
                }

                setIsLoadingMessages(true);
                try {
                    const res = await fetch('/api/facebook/messages');
                    if (res.ok) {
                        const data = await res.json();
                        setMessages(data);
                        if (data.length > 0 && !selectedMessage) {

                setIsSavingConfig(true);
                try {

                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(config)
                    });
                    if (res.ok) {
                        const r = await res.json();
                        setConfig(r.config);
                        showMessage("Configurações do Meta integradas com sucesso!");
                    } else {
                        showMessage("Erro ao salvar configurações.", true);
                    }

                    showMessage(e.message, true);
                } finally {
                    setIsSavingConfig(false);
                }
            };

            const handleSyncShopify = async () => {
                setIsLoadingProducts(true);
                try {
                    // Tenta via servidor primeiro
                    const res = await fetch('/api/facebook/sync-shopify', { method: 'POST' });
                    const data = res.ok ? await res.json() : null;

                    if (data && data.success) {
                        showMessage(`Sincronização concluída via servidor! ${data.imported} novos produtos importados.`);
                        fetchProducts();
                        return;
                    }

                    // Fallback: Sincronização direta pelo navegador usando o feed público
                    console.log("[SHOPIFY-FALLBACK] Sincronização via servidor falhou. Iniciando busca direta pelo navegador...");
                    
                    const clientRes = await fetch('https://printoustudio3d.com/products.json?limit=100');
                    if (!clientRes.ok) {
                        throw new Error("Não foi possível acessar o feed público de produtos do site.");
                    }

                    const clientData = await clientRes.json();
                    if (!clientData.products || clientData.products.length === 0) {
                        throw new Error("Nenhum produto exposto no feed público do site.");
                    }

                    // Envia os produtos para o servidor salvar no banco
                    const saveRes = await fetch('/api/facebook/save-shopify-products', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ products: clientData.products })
                    });

                    if (saveRes.ok) {
                        const saveData = await saveRes.json();
                        showMessage(`Sincronização concluída via navegador! ${saveData.imported} novos produtos importados.`);
                        fetchProducts();
                    } else {
                        const saveErr = await saveRes.json();
                        throw new Error(saveErr.error || "Erro ao salvar produtos no servidor.");
                    }
                } catch (e) {
                    console.error("[SHOPIFY-FALLBACK-ERR]", e);
                    showMessage("Erro na sincronização: " + e.message, true);
                } finally {
                    setIsLoadingProducts(false);
                }
            };

                try {
                    const res = await fetch(`/api/facebook/products/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        showMessage("Produto removido com sucesso!");
                        fetchProducts();
                    } else {

                    {/* ABA: MENSAGENS */}
                    {activeTab === 'messages' && (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 h-[500px] animate-fade-in">
                            {/* Lista Lateral de Conversas */}
                            <div className="glass-panel rounded-2xl border border-white/5 flex flex-col overflow-hidden">

                                                </span>
                                            </div>
